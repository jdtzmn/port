name: Linux Integration Tests

on:
  workflow_call:
    inputs:
      run-traefik-diagnostics:
        description: Run Traefik diagnostics when tests fail
        required: false
        type: boolean
        default: true
      shards:
        description: JSON array of shard indexes (for matrix)
        required: false
        type: string
        default: '[1,2,3]'
      total-shards:
        description: Total number of Vitest shards
        required: false
        type: number
        default: 3

jobs:
  linux-integration:
    name: Linux Integration Tests (Shard ${{ matrix.shard }}/${{ inputs.total-shards }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shard: ${{ fromJSON(inputs.shards) }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure git identity (required by tests)
        run: |
          git config --global user.email "ci@test.local"
          git config --global user.name "CI Runner"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Install extra shells (for shell integration tests)
        run: sudo apt-get update && sudo apt-get install -y zsh fish

      - name: Create global `port` command
        run: |
          sudo ln -s "$(pwd)/dist/index.js" /usr/local/bin/port && chmod +x dist/index.js

      - name: Pre-pull and build Docker images used by integration tests
        run: |
          # Pull/build images from test sample compose files
          for dir in tests/samples/*/; do
            if [ -f "$dir/docker-compose.yml" ]; then
              docker compose -f "$dir/docker-compose.yml" pull --ignore-buildable &
              docker compose -f "$dir/docker-compose.yml" build &
            fi
          done

          # Pull the Traefik image referenced in source code
          grep -roh "traefik:v[0-9.]*" src/lib/traefik.ts | head -1 | xargs docker pull &

          # Build the 404 handler image locally (not yet published for this branch)
          VERSION=$(jq -r .version package.json)
          docker build -t "ghcr.io/jdtzmn/port-404-handler:${VERSION}" packages/404-app/ &

          wait

      - name: Configure DNS
        run: |
          sudo env PATH=$PATH port install -y
          sudo env PATH=$PATH port install --domain test -y

      - name: Run tests
        run: bunx vitest --shard=${{ matrix.shard }}/${{ inputs.total-shards }}

      - name: Traefik diagnostics
        if: failure() && inputs.run-traefik-diagnostics
        run: |
          echo "=== Docker containers ==="
          docker ps -a
          echo "=== Docker networks ==="
          docker network ls
          echo "=== Traefik logs ==="
          docker logs --tail 100 port-traefik 2>&1 || echo "(no traefik container)"
          echo "=== Traefik config ==="
          docker exec port-traefik cat /etc/traefik/traefik.yml 2>&1 || echo "(no traefik container)"
          echo "=== Traefik HTTP routers ==="
          docker exec port-traefik wget -qO- http://127.0.0.1:8080/api/http/routers 2>&1 || echo "(API unavailable)"
          echo "=== Traefik entrypoints ==="
          docker exec port-traefik wget -qO- http://127.0.0.1:8080/api/entrypoints 2>&1 || echo "(API unavailable)"

      - name: Capture shard diagnostics artifact
        if: failure() && inputs.run-traefik-diagnostics
        run: |
          artifact_dir="$RUNNER_TEMP/traefik-diagnostics-shard-${{ matrix.shard }}"
          mkdir -p "$artifact_dir"

          docker ps -a > "$artifact_dir/docker-ps.txt"
          docker network ls > "$artifact_dir/docker-network-ls.txt"

          docker logs --tail 200 port-traefik > "$artifact_dir/traefik-logs.txt" 2>&1 || true
          docker exec port-traefik cat /etc/traefik/traefik.yml > "$artifact_dir/traefik-config.yml" 2>&1 || true
          docker exec port-traefik wget -qO- http://127.0.0.1:8080/api/http/routers > "$artifact_dir/traefik-routers.json" 2>&1 || true
          docker exec port-traefik wget -qO- http://127.0.0.1:8080/api/entrypoints > "$artifact_dir/traefik-entrypoints.json" 2>&1 || true

      - name: Upload shard diagnostics artifact
        if: failure() && inputs.run-traefik-diagnostics
        uses: actions/upload-artifact@v4
        with:
          name: linux-integration-diagnostics-shard-${{ matrix.shard }}
          path: ${{ runner.temp }}/traefik-diagnostics-shard-${{ matrix.shard }}
